name: Build and deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Install backend production dependencies
        working-directory: backend
        run: npm ci --omit=dev

      # frontend/node_modules are only needed for the build step above.
      # Remove them so they are not included in the deployment artifact.
      - name: Remove frontend node_modules
        run: rm -rf frontend/node_modules

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
